server {
    listen 80;
    server_name launcher.dotaclassic.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name launcher.dotaclassic.ru;

    ssl_certificate     /etc/letsencrypt/live/launcher.dotaclassic.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/launcher.dotaclassic.ru/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    open_file_cache          max=1000 inactive=30s;
    open_file_cache_valid    60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors   on;

    location /files/ {
        alias /data/files/;

        sendfile           on;
        sendfile_max_chunk 2m;
        directio           4m;
        aio                threads;
        output_buffers     8 1m;

        # Files are content-addressed via manifest hash — safe to cache long-term
        add_header Cache-Control "public, max-age=2592000, immutable";
        add_header Accept-Ranges bytes;
        etag on;
    }

    location / {
        return 404;
    }
}
